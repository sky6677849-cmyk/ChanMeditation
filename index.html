<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>佛法智慧小遊戲</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{--c-text:#1a1a1a;--c-sub:#5f5e5a;--c-bg:#f1efe8;--c-card:#f7f5f0;--c-border:rgba(0,0,0,0.15);--r:12px}
@media (prefers-color-scheme:dark){:root{--c-text:#f0f0f0;--c-sub:#a0a0a0;--c-bg:#1a1a1a;--c-card:#252525;--c-border:rgba(255,255,255,0.15)}}
body{max-width:680px;margin:20px auto;padding:0 20px;background:var(--c-bg);color:var(--c-text);font-family:-apple-system,"Noto Sans TC","PingFang TC",sans-serif;-webkit-text-size-adjust:100%}
.hero{background:var(--c-card);border-radius:var(--r);padding:1.75rem 1.5rem;text-align:center;margin-bottom:1rem}
.hero h1{font-size:22px;font-weight:500;margin:0 0 6px}
.hero p{font-size:14px;color:var(--c-sub);line-height:1.7;margin:0 auto;max-width:480px}
.list{display:flex;flex-direction:column;gap:10px}
.item{background:var(--c-card);border-radius:var(--r);padding:16px 18px;text-decoration:none;color:inherit;display:flex;align-items:center;gap:14px;border:0.5px solid var(--c-border);transition:transform 0.1s}
.item:active{transform:scale(0.98)}
.item .num{font-size:11px;color:var(--c-sub);letter-spacing:1px;margin-bottom:2px}
.item .name{font-size:15px;font-weight:500;margin-bottom:2px}
.item .desc{font-size:12px;color:var(--c-sub);line-height:1.6}
.item .body{flex:1}
.item .arrow{color:var(--c-sub);font-size:18px}
.footer{font-size:11px;color:var(--c-sub);text-align:center;margin-top:1.5rem;line-height:1.7}
</style>
</head>
<body>
<div class="hero">
  <h1>佛法智慧小遊戲</h1>
  <p>把現代生活的煩惱，對應到佛陀兩千五百年前開出的處方箋。依《學佛五講》(法鼓文化, 2007) 編寫。</p>
</div>
<div class="list">
  <a class="item" href="ch0.html">
    <div class="body">
      <div class="num">第零章</div>
      <div class="name">宗教與佛教辨識</div>
      <div class="desc">內道 vs 外道、世俗化 vs 淨化身心</div>
    </div>
    <i class="ti ti-chevron-right arrow"></i>
  </a>
  <a class="item" href="ch1.html">
    <div class="body">
      <div class="num">第一章</div>
      <div class="name">八苦 · 四聖諦</div>
      <div class="desc">用苦集滅道拆解八種人生痛點</div>
    </div>
    <i class="ti ti-chevron-right arrow"></i>
  </a>
  <a class="item" href="ch2.html">
    <div class="body">
      <div class="num">第二章</div>
      <div class="name">五蘊 · 情緒事件拆解</div>
      <div class="desc">色受想行識五層分析</div>
    </div>
    <i class="ti ti-chevron-right arrow"></i>
  </a>
  <a class="item" href="ch3.html">
    <div class="body">
      <div class="num">第三章</div>
      <div class="name">十二因緣 · 流轉門</div>
      <div class="desc">觸→受→愛→取→有 的日常版</div>
    </div>
    <i class="ti ti-chevron-right arrow"></i>
  </a>
</div>
<div class="footer">後續章節規劃：第四章 還滅門 · 第五章 八正道</div>
</body>
</html>
