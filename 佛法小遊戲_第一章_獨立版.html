<style>:root{--color-text-primary:#1a1a1a;--color-text-secondary:#5f5e5a;--color-text-tertiary:#888780;--color-text-danger:#993C1D;--color-text-warning:#854F0B;--color-text-success:#0F6E56;--color-text-info:#185FA5;--color-background-primary:#ffffff;--color-background-secondary:#f7f5f0;--color-background-tertiary:#f1efe8;--color-background-danger:#FAECE7;--color-background-warning:#FAEEDA;--color-background-success:#E1F5EE;--color-background-info:#E6F1FB;--color-border-tertiary:rgba(0,0,0,0.15);--color-border-secondary:rgba(0,0,0,0.3);--color-border-primary:rgba(0,0,0,0.4);--color-border-info:#378ADD;--font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",sans-serif;--border-radius-md:8px;--border-radius-lg:12px}@media (prefers-color-scheme:dark){:root{--color-text-primary:#f0f0f0;--color-text-secondary:#a0a0a0;--color-text-tertiary:#707070;--color-background-primary:#1a1a1a;--color-background-secondary:#252525;--color-background-tertiary:#2a2a2a;--color-background-danger:#4A1B0C;--color-background-warning:#412402;--color-background-success:#04342C;--color-background-info:#042C53;--color-border-tertiary:rgba(255,255,255,0.15);--color-border-secondary:rgba(255,255,255,0.3)}}body{max-width:720px;margin:20px auto;padding:0 20px;background:var(--color-background-tertiary);color:var(--color-text-primary);font-family:var(--font-sans);-webkit-text-size-adjust:100%}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}.bg-app{padding:1rem 0;font-family:var(--font-sans)}.bg-screen{display:none}.bg-screen.on{display:block}.bg-hero{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1.75rem 1.5rem;text-align:center}.bg-hero h1{font-size:22px;font-weight:500;margin:0 0 6px;color:var(--color-text-primary)}.bg-hero .bg-sub{font-size:14px;color:var(--color-text-secondary);margin:0 auto 4px;line-height:1.7;max-width:520px}.bg-hero .bg-chapter{font-size:12px;color:var(--color-text-tertiary);margin:6px 0 1rem;letter-spacing:0.5px}.bg-eight{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-width:540px;margin:1rem auto 1rem;text-align:center}.bg-eight-item{padding:8px 4px;background:var(--color-background-primary);border-radius:var(--border-radius-md);font-size:12px;line-height:1.4;border:0.5px solid var(--color-border-tertiary)}.bg-eight-item .ti{font-size:16px;display:block;margin-bottom:2px;color:var(--color-text-danger)}.bg-eight-item .bg-name{font-weight:500}.bg-flow{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;max-width:540px;margin:0.5rem auto 1.25rem}.bg-flow-item{padding:8px 4px;border-radius:var(--border-radius-md);text-align:center;font-size:12px;line-height:1.5}.bg-flow-item .bg-zh{font-weight:500;font-size:14px;display:block}.bg-flow-item .bg-en{font-size:11px;opacity:0.85}.bg-flow-item[data-c="0"]{background:var(--color-background-danger);color:var(--color-text-danger)}.bg-flow-item[data-c="1"]{background:var(--color-background-warning);color:var(--color-text-warning)}.bg-flow-item[data-c="2"]{background:var(--color-background-success);color:var(--color-text-success)}.bg-flow-item[data-c="3"]{background:var(--color-background-info);color:var(--color-text-info)}.bg-source{font-size:11px;color:var(--color-text-tertiary);margin:1rem 0 1.25rem;line-height:1.6}.bg-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:12px;color:var(--color-text-secondary)}.bg-pdots{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}.bg-pdot{width:28px;height:4px;background:var(--color-border-tertiary);border-radius:2px;transition:background 0.2s}.bg-pdot.done{background:var(--color-text-success)}.bg-pdot.now{background:var(--color-text-primary)}.bg-card{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:12px}.bg-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);margin-bottom:6px}.bg-tag .ti{font-size:13px}.bg-stitle{font-size:16px;font-weight:500;margin:0 0 4px}.bg-sdesc{font-size:13px;color:var(--color-text-secondary);line-height:1.7;margin:0}.bg-map{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}.bg-node{padding:10px 6px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);text-align:center;opacity:0.45;transition:all 0.25s}.bg-node.now{opacity:1;border:2px solid var(--color-border-info);padding:9px 5px}.bg-node.done{opacity:1}.bg-node[data-step="0"].done{background:var(--color-background-danger);border-color:var(--color-text-danger)}.bg-node[data-step="1"].done{background:var(--color-background-warning);border-color:var(--color-text-warning)}.bg-node[data-step="2"].done{background:var(--color-background-success);border-color:var(--color-text-success)}.bg-node[data-step="3"].done{background:var(--color-background-info);border-color:var(--color-text-info)}.bg-node[data-step="0"].done .bg-node-name,.bg-node[data-step="0"].done .bg-node-ic,.bg-node[data-step="0"].done .bg-node-sub{color:var(--color-text-danger)}.bg-node[data-step="1"].done .bg-node-name,.bg-node[data-step="1"].done .bg-node-ic,.bg-node[data-step="1"].done .bg-node-sub{color:var(--color-text-warning)}.bg-node[data-step="2"].done .bg-node-name,.bg-node[data-step="2"].done .bg-node-ic,.bg-node[data-step="2"].done .bg-node-sub{color:var(--color-text-success)}.bg-node[data-step="3"].done .bg-node-name,.bg-node[data-step="3"].done .bg-node-ic,.bg-node[data-step="3"].done .bg-node-sub{color:var(--color-text-info)}.bg-node-ic{font-size:18px}.bg-node-name{font-size:13px;font-weight:500;margin-top:3px}.bg-node-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:1px}.bg-qbox{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px}.bg-qtitle{font-size:14px;font-weight:500;margin:0 0 10px;line-height:1.6}.bg-opts{display:flex;flex-direction:column;gap:6px}.bg-opt{padding:10px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;font-size:13px;line-height:1.6;transition:all 0.15s;text-align:left;font-family:inherit;color:var(--color-text-primary)}.bg-opt:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}.bg-opt.sel{border:2px solid var(--color-border-info);padding:9px 13px}.bg-opt.ok{border-color:var(--color-text-success);background:var(--color-background-success);color:var(--color-text-success)}.bg-opt.bad{border-color:var(--color-text-danger);background:var(--color-background-danger);color:var(--color-text-danger)}.bg-opt.lock{cursor:default;pointer-events:none}.bg-fb{padding:10px 14px;border-radius:var(--border-radius-md);font-size:12px;line-height:1.7;margin-top:10px}.bg-fb.ok{background:var(--color-background-success);color:var(--color-text-success)}.bg-fb.bad{background:var(--color-background-danger);color:var(--color-text-danger)}.bg-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}.bg-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s;font-family:inherit;color:var(--color-text-primary)}.bg-btn:hover{background:var(--color-background-secondary)}.bg-btn:active{transform:scale(0.98)}.bg-btn.prim{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}.bg-btn:disabled{opacity:0.35;cursor:not-allowed}.bg-rx{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:14px 16px}.bg-rx-row{display:grid;grid-template-columns:110px 1fr;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary);align-items:start}.bg-rx-row:last-child{border-bottom:none}.bg-rx-l{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500}.bg-rx-l .ti{font-size:16px}.bg-rx-t{font-size:13px;line-height:1.7;color:var(--color-text-secondary)}.bg-rx-row[data-s="0"] .bg-rx-l{color:var(--color-text-danger)}.bg-rx-row[data-s="1"] .bg-rx-l{color:var(--color-text-warning)}.bg-rx-row[data-s="2"] .bg-rx-l{color:var(--color-text-success)}.bg-rx-row[data-s="3"] .bg-rx-l{color:var(--color-text-info)}.bg-final{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:2rem 1.5rem;text-align:center}.bg-final h2{font-size:18px;font-weight:500;margin:0 0 6px}.bg-score{font-size:36px;font-weight:500;margin:12px 0;color:var(--color-text-primary)}.bg-score-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem}.bg-final-msg{font-size:13px;color:var(--color-text-secondary);line-height:1.7;margin:1rem auto 1.5rem;max-width:480px}.bg-coming{background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:12px 16px;margin:1rem auto 0;max-width:520px;font-size:12px;color:var(--color-text-tertiary)}.bg-coming-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px}</style>

<body>
<div class="bg-app">
  <div class="bg-screen on" id="bg-welcome">
    <div class="bg-hero">
      <h1>佛法智慧小遊戲</h1>
      <p class="bg-sub">把現代生活的煩惱，對應到佛陀兩千五百年前開出的處方箋</p>
      <div class="bg-chapter">第一章 · 八苦・四聖諦</div>
      <p class="bg-sub" style="font-size: 13px;">人生有八種苦。佛陀說，每一種苦都有它的「症狀、病因、痊癒、處方」四個面向。這就是四聖諦的修學方法。</p>
      <div class="bg-eight">
        <div class="bg-eight-item"><i class="ti ti-heart-broken" aria-hidden="true"></i><div class="bg-name">愛別離</div></div>
        <div class="bg-eight-item"><i class="ti ti-mood-confuzed" aria-hidden="true"></i><div class="bg-name">怨憎會</div></div>
        <div class="bg-eight-item"><i class="ti ti-target-off" aria-hidden="true"></i><div class="bg-name">求不得</div></div>
        <div class="bg-eight-item"><i class="ti ti-baby-carriage" aria-hidden="true"></i><div class="bg-name">生</div></div>
        <div class="bg-eight-item"><i class="ti ti-walk" aria-hidden="true"></i><div class="bg-name">老</div></div>
        <div class="bg-eight-item"><i class="ti ti-stethoscope" aria-hidden="true"></i><div class="bg-name">病</div></div>
        <div class="bg-eight-item"><i class="ti ti-skull" aria-hidden="true"></i><div class="bg-name">死</div></div>
        <div class="bg-eight-item"><i class="ti ti-flame" aria-hidden="true"></i><div class="bg-name">五蘊熾盛</div></div>
      </div>
      <div class="bg-flow">
        <div class="bg-flow-item" data-c="0"><span class="bg-zh">苦</span><span class="bg-en">應知 · 看清症狀</span></div>
        <div class="bg-flow-item" data-c="1"><span class="bg-zh">集</span><span class="bg-en">應斷 · 看穿盲點</span></div>
        <div class="bg-flow-item" data-c="2"><span class="bg-zh">滅</span><span class="bg-en">應證 · 體會釋懷</span></div>
        <div class="bg-flow-item" data-c="3"><span class="bg-zh">道</span><span class="bg-en">應修 · 練習行動</span></div>
      </div>
      <p class="bg-sub" style="font-size: 12px;">八種情境 · 三十二題 · 走過完整的四聖諦診斷流程</p>
      <p class="bg-source">內容依據聖嚴法師編寫綱目、常延法師主講《學佛五講》(法鼓文化, 2007)<br>第二講 p.16-23（三法印、四聖諦） · 第三講 p.32-36（人生觀、三苦） · 第四講 p.46-49（八正道）</p>
      <button class="bg-btn prim" id="bg-go">開始遊戲 <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
    </div>
  </div>
  <div class="bg-screen" id="bg-play"></div>
  <div class="bg-screen" id="bg-end"></div>
</div>
<script>(function(){const STEPS = [{ name: '苦', ic: 'alert-circle', sub: '應知' },{ name: '集', ic: 'eye-search',   sub: '應斷' },{ name: '滅', ic: 'leaf',         sub: '應證' },{ name: '道', ic: 'route',        sub: '應修' }];const D = [{a: '上班族', ai: 'briefcase',t: '好主管突然離職',d: '合作無間的好主管被調職，未來不知道怎麼面對新主管和不熟悉的工作模式。',ku: '愛別離苦',q: [{ prompt: '這份痛苦屬於八苦中的哪一種?', options: [{ text: '愛別離苦（與所愛被迫分離）', correct: true, hint: '對，這就是愛別離。八苦裡這條的定義就是「與所愛的人事物被迫分離」——主管離開，你想留也留不住，是不是？(p.23 名相)' },{ text: '怨憎會苦（與所厭被迫相聚）', correct: false, hint: '怨憎會剛好相反——是擺脫不掉討厭的對象。這裡你不是排斥誰，是失去想留住的人，所以是愛別離。' },{ text: '求不得苦（渴望而從未擁有）', correct: false, hint: '求不得是「想要而從來沒有」。好主管你曾經擁有過嘛，是不是？所以這份失落屬於愛別離。' }]},{ prompt: '這份痛苦背後真正的「盲點（集）」是什麼?', options: [{ text: '把這個團隊當成「我的」舒適圈，期待它永遠不變', correct: true, hint: '對了！這就是諸行無常那條的執著——因緣聚合的事物本來就在變化過程當中，我們卻硬要把它抓住，當它是恆存不變的「我的」。(p.16 三法印第一條)' },{ text: '新主管能力八成不如舊主管', correct: false, hint: '這個念頭乍看合理，但你想看——還沒見過新主管就先預設立場，這是把過去的好經驗綁住現在的判斷。真正的盲點還在更裡面：對「不變」的執著。' },{ text: '公司不該讓人事輕易變動', correct: false, hint: '把責任推到公司制度，這是常見的反應。但制度怎麼安排是世間因緣；你的痛苦來自內心的執著，是兩件事。先看清自己再說。' }]},{ prompt: '「滅（轉念後的平靜）」應該是什麼樣子?', options: [{ text: '反正都會變，乾脆對誰都不投入感情', correct: false, hint: '這不是放下，這是冷漠跟壓抑——表面上不痛，其實心裡築了高牆。佛法講的滅是溫暖的釋懷，不是麻木的。' },{ text: '看清楚團隊本是因緣暫時相聚，感謝過去學到的，繼續往前走', correct: true, hint: '對！這就是諸行無常的智慧落實——能感謝、能祝福、能放下。聖嚴師父說「接受他、面對他、處理他、放下他」，四步走完，痛苦就過去了。(20-4 課)' },{ text: '趕快找下一個依靠對象，建立新的舒適圈', correct: false, hint: '只是把執著的對象換一個而已嘛，是不是？盲點還沒看清，下次主管再換一次，你又要痛一次。' }]},{ prompt: '具體的「行動（道）」應該怎麼做?', options: [{ text: '每天跟同事抱怨新主管哪裡不行', correct: false, hint: '違反「正語」——你不只把負面情緒散出去，還在製造新的怨憎會苦。對自己對別人都沒幫助。(p.47 八正道圖)' },{ text: '衝動跟著舊主管一起辭職', correct: false, hint: '違反「正思惟」——把執著直接變成決策。盲點沒處理，到下一份工作還是會遇到同樣情境。' },{ text: '把舊主管教過的方法整理下來，運用到新環境', correct: true, hint: '這是「正業」加「正精進」的落實——把過去的善因緣轉化為自己的能力，然後不再執著。緣分結束，能力留下來，這就是修行。(p.47)' }]}]},{a: '上班族', ai: 'briefcase',t: '雷同事每天搶功勞、推卸責任',d: '每天被迫跟只會搶功勞又愛推卸責任的同事共事，每次開會都很煎熬。',ku: '怨憎會苦',q: [{ prompt: '這份痛苦屬於八苦中的哪一種?', options: [{ text: '愛別離苦（與所愛分離）', correct: false, hint: '愛別離是失去你愛的，這裡剛好相反——你想擺脫但擺脫不掉，性質完全不一樣。' },{ text: '怨憎會苦（與所厭被迫相聚）', correct: true, hint: '對了！怨憎會的定義就是「與不喜歡、不認同的對象被迫相處」。職場、家庭、社會，這種苦其實天天在演。(p.23)' },{ text: '求不得苦（渴望而不可得）', correct: false, hint: '求不得是「想要的得不到」；這裡的問題是「想擺脫的擺脫不掉」，方向相反——所以是怨憎會。' }]},{ prompt: '這份痛苦背後真正的「盲點（集）」是什麼?', options: [{ text: '我已經很有耐心了，他根本不值得我容忍', correct: false, hint: '這念頭聽起來很有道理對不對？但仔細看——「他應該值得我才容忍」這就是把標準往對方身上掛，本質上還是諸法無我那條的盲點。' },{ text: '期待職場上「每個人都應該公平、認真」，遇到不符的就無法接受', correct: true, hint: '對！這個「應該」就是集的核心。你想看，你對別人的「應該」就是綁住自己的繩子嘛——別人一不符合，你就氣。這違反諸法無我。(p.16, 8-1 課)' },{ text: '應該離職換一個有好同事的公司', correct: false, hint: '逃避不算解方，是不是？這個職場有雷同事，下個職場也有；環境換了，內心的執著沒換，下次還是會踩到。' }]},{ prompt: '「滅（轉念後的平靜）」應該是什麼樣子?', options: [{ text: '理解每個人都有自己的因緣與功課，不再用「應該」綁自己的心', correct: true, hint: '對！放下對他人的「應該」，自己的心就鬆開了。諸法無我說的就是——沒有一個本來如此、永遠如此的「他應該怎樣」存在，那只是我們的執著。(p.16)' },{ text: '變得更冷漠，把所有同事都當潛在的雷', correct: false, hint: '築起高牆不是釋懷，反而把痛苦擴大到原本沒事的人身上。這不是中道。' },{ text: '等對方哪天被開除再開心起來', correct: false, hint: '把平靜寄託在對方的厄運上——這份「滅」不是真的，而且也修不到福。心裡的怨憎還在運作，只是換個方向。' }]},{ prompt: '具體的「行動（道）」應該怎麼做?', options: [{ text: '散播對方的負面消息，讓大家都討厭他', correct: false, hint: '違反「正語」——惡口、兩舌、綺語。你會被困在自己的情緒裡，新的怨憎會苦又在路上了。(p.30, p.47)' },{ text: '把雷同事當成「磨練心性的功課」，記錄事實、做好分內事、不被情緒帶走', correct: true, hint: '這是「修忍辱（安忍）」的實踐——不對抗也不縱容，事實清楚、心境平穩。安忍五德：相貌莊嚴、辯才明晰、善友共住、不犯禁戒、趣向佛道。(p.35)' },{ text: '開會時直接跟對方爆發衝突', correct: false, hint: '違反「正業」——出於瞋心的行動。瞋心五失：壞色、失辯、善士遠離、毀戒、墮落，划不來。(p.35)' }]}]},{a: '一般人', ai: 'user',t: '想買跑車但存不到頭期款',d: '看著朋友開新跑車，自己努力工作卻一直存不到錢，越看越焦躁。',ku: '求不得苦',q: [{ prompt: '這份痛苦屬於八苦中的哪一種?', options: [{ text: '求不得苦（渴望而不可得）', correct: true, hint: '對！求不得的定義就是「渴望的得不到」。具體的對象、清楚的渴望、達不到——這條完全對得上。(p.23)' },{ text: '五蘊熾盛苦（身心本然的躁動）', correct: false, hint: '五蘊熾盛是「沒有特定目標也覺得不安」，比較根本性。這裡你有清楚的目標——跑車——所以是求不得。' },{ text: '愛別離苦（與所愛分離）', correct: false, hint: '愛別離是失去過去擁有的；你從來沒擁有過跑車，所以是「求」不得，不是「別離」。' }]},{ prompt: '這份痛苦背後真正的「盲點（集）」是什麼?', options: [{ text: '經濟不景氣、薪水太低，是大環境的錯', correct: false, hint: '抱怨大環境很容易，但你想看——同樣的環境，有些人不會痛苦，有些人會。差別在哪？在內心對「想要」的執著程度。' },{ text: '朋友是炫耀型人格，看了讓人煩', correct: false, hint: '評斷別人也是轉移焦點的一種方式。朋友開什麼車是他的因緣，你心裡的躁動是你自己的——兩件事不要混為一談。' },{ text: '把跑車當成「成功」的證明，認為沒有它就代表自己不夠好', correct: true, hint: '對了！你真正想要的不是車本身，是「我夠好」的那個認可。這就是諸法無我那條——把一個本來不存在的「我夠不夠好」當成真實要去捍衛。(p.16)' }]},{ prompt: '「滅（轉念後的平靜）」應該是什麼樣子?', options: [{ text: '看清楚渴望的不是車本身，是被認可的感覺，不再用外物定義自己', correct: true, hint: '對！看見渴望真正的面貌，執著就鬆了一半。這就是「性空」的智慧——車是因緣所生，認可也是因緣所生，沒有一個固定的「我」需要這些東西。(p.16 中道空觀)' },{ text: '努力存錢，買一台更好的車贏過朋友', correct: false, hint: '把執著加倍而已嘛，是不是？這份「滅」是假的，你只是把求不得苦延後並放大。' },{ text: '告訴自己「我才不在乎那種俗氣東西」（其實心裡還是在意）', correct: false, hint: '嘴上否認、心裡還抓著——這叫壓抑不叫放下。法師講過這就是「行苦」：你以為沒事，其實貪嗔的習性反應根本沒停。(p.36 三苦表)' }]},{ prompt: '具體的「行動（道）」應該怎麼做?', options: [{ text: '刷卡分期硬買一台，每個月還款壓力山大', correct: false, hint: '違反「中道」——用負債滿足執著，苦只是延後並加倍，不是離苦。(p.16)' },{ text: '在社群上發文嘲諷愛炫耀的人', correct: false, hint: '違反「正語」——出於妒心的行動。對自己沒幫助，還傷了關係。(p.47)' },{ text: '寫下「為什麼想要」的真實動機，把資源投入能讓自己真正成長的事', correct: true, hint: '這是「正命」加「中道」的實踐——不縱容也不壓抑，看清需求後做最有智慧的選擇。法師講過：人生皆苦不是悲觀，是要我們積極努力，對不對？(p.32 積極努力的人生觀)' }]}]},{a: '一般人', ai: 'user',t: '對自己的出身條件感到不甘',d: '看到別人從小有家庭背景、人脈、資源，自己卻要從零打拼，覺得起跑點就不公平。',ku: '生苦',q: [{ prompt: '這份痛苦屬於八苦中的哪一種?', options: [{ text: '生苦（被丟入沒選擇的存在條件）', correct: true, hint: '對！生苦不只是出生那一刻的痛，更指「被丟進自己沒選擇的存在條件」——你的家、你的時代、你的身體，全是你還沒開始選之前就已經給定的。(p.23, 20-4 課)' },{ text: '求不得苦（渴望而不可得）', correct: false, hint: '求不得是還沒得到的目標；這裡你不甘的不是某個東西，是「一開始就被分配到的條件」——這比求不得更根本，屬於生苦。' },{ text: '怨憎會苦（與所厭被迫相聚）', correct: false, hint: '怨憎會是跟不喜歡的人事相聚；這裡是對自己人生起點的不滿，對象是「自己的條件」，所以是生苦。' }]},{ prompt: '這份痛苦背後真正的「盲點（集）」是什麼?', options: [{ text: '父母當年沒拚到位，才害我現在這樣', correct: false, hint: '把責任全推給父母，這違反「敬養父母如三世諸佛」的人倫關係。而且這念頭只是把苦轉一個方向發洩，盲點沒看到。(p.47 家庭生活)' },{ text: '認為「應該有一個更公平的起點」，把不是自己選的條件當成不公', correct: true, hint: '對！這是把「應然」加在「實然」上。佛法講因果三世都有、因緣十方皆無——出生條件是過去無量因緣的果報，不是「應該怎樣」的議題。看清這點，「不公平」這個框架就鬆了。(p.16, p.32 面對現實的人生觀)' },{ text: '是社會制度沒做好才產生階級', correct: false, hint: '制度議題可以倡議改變，這很好——但這跟你內心的不甘是兩回事。倡議是行動，不甘是內在的執著，要分開處理。' }]},{ prompt: '「滅（轉念後的平靜）」應該是什麼樣子?', options: [{ text: '完全認命，什麼都不做', correct: false, hint: '佛法不是宿命論。「認命」是停在那裡，「明因緣」是看清楚之後繼續努力，這兩個不一樣。' },{ text: '假裝不在乎，繼續暗中比較', correct: false, hint: '這是壓抑不是釋懷。心裡的「集」還在運作，只是不講出來而已——這正是行苦的典型樣貌。(p.36)' },{ text: '明白每個生命的起點都是過去因緣的結果，接受這是自己的功課', correct: true, hint: '對！這就是聖嚴法師講的「接受他、面對他、處理他、放下他」——接受是最難的第一步，接受了就走得動。(20-4 課)' }]},{ prompt: '具體的「行動（道）」應該怎麼做?', options: [{ text: '挑剔成功的人哪裡有瑕疵、哪裡其實沒那麼好', correct: false, hint: '違反「正思惟」——用負面方式平衡自己，實質沒改變什麼。(p.47)' },{ text: '抱怨原生家庭，責怪父母的選擇', correct: false, hint: '違反「正語」與佛化家庭的基本條件。父母是過去因緣的呈現，責怪他們改變不了結果，反而種下新的惡因。(p.47)' },{ text: '在自己現有條件上盡力，把心力放在可以改變的地方', correct: true, hint: '這就是「積極努力的人生觀」——因果如此，因緣可以增上。緣起法則是自然法則，不是佛規定的；想要離苦得樂，唯有自己積極努力。(p.32)' }]}]},{a: '一般人', ai: 'user',t: '中年發現體力、容貌、記憶力都不如從前',d: '過了某個年紀，照鏡子看到皺紋、爬樓梯就喘、記憶力下降，心裡很不甘願。',ku: '老苦',q: [{ prompt: '這份痛苦屬於八苦中的哪一種?', options: [{ text: '老苦（身心隨時間自然衰變）', correct: true, hint: '對！老苦特別指的是身心隨時間自然衰變所帶來的苦受。法師講過——這是這一期生命的必然過程，沒有人不老不死。(p.23, 20-4 課)' },{ text: '五蘊熾盛苦（身心本然的躁動）', correct: false, hint: '五蘊熾盛是任何時候都可能出現的身心煩躁；這裡是特定的「年齡帶來的變化」，屬於老苦。' },{ text: '求不得苦（渴望而不可得）', correct: false, hint: '你想要的「年輕」曾經有過，這是失去過去的自己——老苦特有的型態。' }]},{ prompt: '這份痛苦背後真正的「盲點（集）」是什麼?', options: [{ text: '化妝品、保健品產業害人焦慮', correct: false, hint: '抱怨外境很容易，但你想看——廣告不看就好了嘛。真正讓你看完廣告之後痛的，是內心對「不變」的執著。產業只是外緣，集在你心裡。' },{ text: '把「年輕的自己」當成真實的我，無法接受身體的自然變化', correct: true, hint: '對！這就是諸行無常加諸法無我那兩條——沒有一個「永遠如此」的年輕的我存在。法師講過「有我」的三個特性：本來如此、自己如此、永遠如此；身體三個都不符合。(p.16, 8-1 課)' },{ text: '應該去做醫美整形', correct: false, hint: '這是行動上的反應，不是內心的盲點本身。先看清楚集，再決定要不要動，順序不能反。' }]},{ prompt: '「滅（轉念後的平靜）」應該是什麼樣子?', options: [{ text: '假裝自己還很年輕，否認衰老', correct: false, hint: '這是逃避，違反「面對現實的人生觀」。把眼睛閉起來，現實不會消失。(p.32)' },{ text: '自暴自棄，放棄所有保養', correct: false, hint: '從「執著青春」滑到「放棄身體」這另一個極端，違反中道。中道是兩邊都不執，不是換邊執著。(p.16)' },{ text: '明白身體本來就在無常變化，所謂的「我」是不同階段的因緣聚合', correct: true, hint: '對！這就是諸行無常加諸法無我落實到身體上的智慧。身體在變，但有什麼好怕的？該照顧的就照顧，該接受的就接受。' }]},{ prompt: '具體的「行動（道）」應該怎麼做?', options: [{ text: '拚命整形、買保養品想回到過去', correct: false, hint: '違反「中道」——用錢跟身體對抗無常，把集直接變成行動。(p.16)' },{ text: '接受變化的同時照顧身心健康，把過去的執著轉化為當下的智慧', correct: true, hint: '這就是中道加正精進的實踐——不放縱也不對抗，把生命階段的轉變當功課。順境逆境都是緣起，都可以拿來修。(p.32)' },{ text: '把焦慮投射到年輕人身上，覺得「現在的年輕人都不懂珍惜」', correct: false, hint: '違反「正語」——把自己的不甘變成對他人的批判。年輕人聽到也是怨憎會苦，何苦呢？' }]}]},{a: '上班族', ai: 'briefcase',t: '健檢發現慢性病，必須長期吃藥',d: '健康檢查發現自己有高血壓或糖尿病等慢性病，必須長期吃藥、忌口、改變生活方式。',ku: '病苦',q: [{ prompt: '這份痛苦屬於八苦中的哪一種?', options: [{ text: '病苦（身體機能失調的苦受）', correct: true, hint: '對！病苦是身體機能失調帶來的苦受跟心理衝擊。年輕也會病、老人也會病——所以病苦不限年齡，獨立於老苦之外。(p.23)' },{ text: '五蘊熾盛苦（身心本然的躁動）', correct: false, hint: '五蘊熾盛是平時的存在不安；這裡是明確的疾病診斷，屬於病苦。' },{ text: '老苦（自然衰變的苦）', correct: false, hint: '老苦是隨時間自然衰變；疾病可以發生在任何年齡，跟年紀無關，是病苦。' }]},{ prompt: '這份痛苦背後真正的「盲點（集）」是什麼?', options: [{ text: '認為「我的身體應該永遠健康，得病是不應該發生的事」', correct: true, hint: '對！這違反了諸行無常——身體本來就會在因緣中變化。飲食、作息、年齡、遺傳全是因緣，因緣聚了就病、散了就好，沒有什麼「應不應該」。(p.16)' },{ text: '一定是公司害我加班才這樣', correct: false, hint: '加班的確是一個因緣，但只是「之一」。把所有責任推給公司，自己過去的飲食作息呢？這是跳過自己內在的執著。' },{ text: '醫生只是想賺錢、是檢查太敏感', correct: false, hint: '質疑醫生在迴避面對自己身體的真實狀態。「實證實知」是佛法的態度——先承認事實，再來想對策。' }]},{ prompt: '「滅（轉念後的平靜）」應該是什麼樣子?', options: [{ text: '否認檢查結果，不去複診', correct: false, hint: '這是逃避，違反「面對現實的人生觀」。眼睛閉起來病不會自己好。(p.32)' },{ text: '完全絕望，覺得人生毀了', correct: false, hint: '從一個極端滑到另一個極端，不是中道。法師講過：「人生皆苦不是悲觀，反而是最積極的提醒」。(20-4 課)' },{ text: '明白身體本來就會生病，接受這是身心的自然現象與業緣的呈現', correct: true, hint: '對！這就是諸行無常加因果觀的落實——既不否認也不絕望。接受了，才能好好處理；處理過了，才放得下。' }]},{ prompt: '具體的「行動（道）」應該怎麼做?', options: [{ text: '偏信偏方、拒絕正規治療', correct: false, hint: '違反「正見」——對因果跟醫學常識的誤解。反而傷害色身。(p.47)' },{ text: '把疾病當成提醒，調整生活方式、好好吃藥、配合醫生', correct: true, hint: '這是「正精進」加「正命」的實踐——用疾病當功課，照顧好色身才能繼續修行。色身是修行的工具，工具要顧好。(p.46 居士修行五法)' },{ text: '過度焦慮，每天查資料嚇自己', correct: false, hint: '違反「正念」——心被恐懼帶走，反而加重身心的負擔。這也是五蘊熾盛的另一種樣貌。' }]}]},{a: '一般人', ai: 'user',t: '突然意識到「我也會死」',d: '某天看新聞看到同齡的人意外過世，回家後一直無法平靜，第一次真實感受到「我會死，而且不知道什麼時候」。',ku: '死苦',q: [{ prompt: '這份痛苦屬於八苦中的哪一種?', options: [{ text: '死苦（面對自身會結束的根本恐懼）', correct: true, hint: '對！死苦是直接面對「自己終究會結束」這個事實的恐懼。法師講過——這是這一期生命的必然，沒有人例外。(p.23, 20-4 課)' },{ text: '老苦（自然衰變的苦）', correct: false, hint: '老苦聚焦在衰變的過程；這裡的核心是「終結」這個事實本身，屬於死苦。' },{ text: '五蘊熾盛苦（身心本然的躁動）', correct: false, hint: '五蘊熾盛是模糊的存在不安；這裡是明確的死亡覺察，性質更具體，屬於死苦。' }]},{ prompt: '這份痛苦背後真正的「盲點（集）」是什麼?', options: [{ text: '醫療科技還不夠先進，未來人類應該可以不死', correct: false, hint: '把希望寄託在科技上是現代人的「永生執著」。但你想看——就算多活一百年，那個會死的「我」還是會死，只是延後而已。集在「有我」那條沒解開。' },{ text: '認為有一個「我」會被死亡帶走，這個「我」應該繼續存在', correct: true, hint: '對！這違反諸法無我——法師講「有我」的三特性：本來如此、自己如此、永遠如此。我們的身心三個都不符合，所以根本沒有一個固定的「我」會被帶走。看清這點，死亡的恐懼就鬆了一半。(p.16, 8-1 課)' },{ text: '應該趕快買保險、立遺囑', correct: false, hint: '這些是實務行動，本身不是錯，但跟「內心的盲點」是兩回事——做完這些恐懼還在的話，你就知道集不在外面。' }]},{ prompt: '「滅（轉念後的平靜）」應該是什麼樣子?', options: [{ text: '不去想就好，假裝死亡不存在', correct: false, hint: '這是壓抑跟逃避，違反「面對現實的人生觀」。法師講過——終究沒有人不病不老不死，把精力投資在否認上是白費力氣。(p.32, 20-4 課)' },{ text: '及時行樂，把所有想做的事一次做完', correct: false, hint: '出於恐慌的行動，是把「集」變成行動，不是真的釋懷。樂完了，那個怕死的我還在。' },{ text: '明白生死本是因緣聚散，看清楚沒有不變的「我」會被帶走', correct: true, hint: '對！這就是「涅槃寂靜」的入口——一切煩惱痛苦止息的狀態，來自看穿自我中心執著的虛幻。(p.16 三法印第三條)' }]},{ prompt: '具體的「行動（道）」應該怎麼做?', options: [{ text: '練習念佛、誦經、修慈悲心，把每一天當成修行的機會', correct: true, hint: '這是「修定」加「修慧」的實踐——六念法門（念佛、念法、念僧、念戒、念施、念天）、五停心觀（數息、不淨、因緣、慈心、界分別），都是面對死亡這個必然的具體方法。(p.60-61)' },{ text: '辭職環遊世界，逃避所有責任', correct: false, hint: '違反「正命」——出於恐慌的行動，沒處理內心的執著。換場景不會換心境。' },{ text: '把恐懼壓下去，繼續忙到忘記它', correct: false, hint: '違反「正念」——用忙碌麻痺自己，根本問題沒解決。等到下一次衝擊來，又會被打回原形。' }]}]},{a: '一般人', ai: 'user',t: '莫名的空虛與焦慮停不下來',d: '生活看起來都還可以，但常常滑手機停不下來、追劇追到累還不能停、心裡有個說不出的空缺。',ku: '五蘊熾盛苦',q: [{ prompt: '這份痛苦屬於八苦中的哪一種?', options: [{ text: '五蘊熾盛苦（身心本然的躁動）', correct: true, hint: '對！五蘊（色受想行識）本身就是不斷起伏的能量。法師講過「行苦」——貪嗔的習性反應不由自主，這份莫名的不安就是行苦的展現。(p.23, p.36 三苦表)' },{ text: '求不得苦（渴望而不可得）', correct: false, hint: '求不得有具體想要的對象；這裡的特點是「沒有特定目標也覺得不安」，屬於更根本的五蘊熾盛。' },{ text: '怨憎會苦（與所厭被迫相聚）', correct: false, hint: '怨憎會有具體討厭的對象；這裡是對自己身心狀態本身的不安，沒有外境對象。' }]},{ prompt: '這份痛苦背後真正的「盲點（集）」是什麼?', options: [{ text: '工作太累，需要更多娛樂來放鬆', correct: false, hint: '把症狀當原因。法師講過——不苦不樂的捨受我們也安住不下來，「閒來無事就覺得好無聊，趕快創造一些有聊的事情」，這就是貪嗔的習性反應在動，娛樂只會加深它。(20-4 課)' },{ text: '把「我這個身心」當成需要不斷被填滿、被刺激、被肯定的真實主體', correct: true, hint: '對！這違反諸法無我——沒有一個真實的「我」需要不斷餵養。法師說的「行苦」就是這個：在毫無意識的狀態下就已經在貪、在瞋，五蘊本身的能量被慣性綁住不停轉動。(p.36)' },{ text: '演算法太邪惡，故意設計成讓人上癮', correct: false, hint: '抱怨外境，跳過了自己心識的攀緣習慣。演算法是緣，心向外攀緣是因——因不處理，換個 app 還是會被勾住。' }]},{ prompt: '「滅（轉念後的平靜）」應該是什麼樣子?', options: [{ text: '把所有娛樂都戒掉，過苦行生活', correct: false, hint: '從放縱滑到另一個極端，違反中道。中道空觀講的是「捨兩邊不執中間」，不是換邊執著。(p.16)' },{ text: '繼續放縱，反正人生就是這樣', correct: false, hint: '這是合理化執著，不是看清盲點。法師講「人生皆苦不是悲觀，反而是最積極的提醒」——合理化等於放棄離苦。(20-4 課)' },{ text: '看見身心活動（色受想行識）本身就是不斷起伏的因緣，不是「我」需要被滿足', correct: true, hint: '對！這就是「五蘊皆空」的智慧——心經那句「照見五蘊皆空，度一切苦厄」講的就是這個。五蘊照清楚了，行苦的鎖鏈就鬆了。' }]},{ prompt: '具體的「行動（道）」應該怎麼做?', options: [{ text: '不斷尋找下一個刺激來填滿空虛', correct: false, hint: '違反「正念」——把集直接變成行動，循環會越來越深。法師講過：娛樂只會加深五蘊熾盛。(20-4 課)' },{ text: '練習觀察身心活動（如數息、念佛、覺察當下），不被慣性帶走', correct: true, hint: '這是「修定」的具體方法——五停心觀的數息觀、念佛、四念住（觀身不淨、觀受是苦、觀心無常、觀法無我），都是看清五蘊運作的工具。(p.60-61)' },{ text: '用工作或物質成就證明「我夠好」', correct: false, hint: '違反「正命」——把對「我」的執著加倍，五蘊只會更熾盛。求不得苦跟五蘊熾盛苦會疊在一起，越燒越旺。' }]}]}];let s = { sIdx: 0, qIdx: 0, sel: null, sub: false, score: 0, scenarioAns: [] };const $play = document.getElementById('bg-play');const $welcome = document.getElementById('bg-welcome');const $end = document.getElementById('bg-end');const total = D.length * 4;function getQuestion(){ return D[s.sIdx].q[s.qIdx]; }function renderPlay(){const sc = D[s.sIdx];const qu = getQuestion();const dots = D.map((_, i) => `<div class="bg-pdot ${i < s.sIdx ? 'done' : i === s.sIdx ? 'now' : ''}"></div>`).join('');const map = STEPS.map((st, i) => {const cls = i < s.qIdx ? 'done' : i === s.qIdx ? 'now' : '';return `<div class="bg-node ${cls}" data-step="${i}">

</div>
</div>

<div class="bg-rx-t">${a.text}${a.correct ? '' : '　<span style="color:var(--color-text-tertiary);">（你的答案不是最佳解）</span>'}</div>
</div>`;}).join('');const isLastS = s.sIdx === D.length - 1;$play.innerHTML = `
<div class="bg-topbar">
<span>第 ${s.sIdx + 1} / ${D.length} 關 完成 · ${sc.ku}</span>
<span>得分　${s.score} / ${total}</span>

</div>

</div>
`;document.getElementById('bg-cont').addEventListener('click', () => {if (isLastS) {showEnd();} else {s.sIdx++;s.qIdx = 0;s.sel = null;s.sub = false;s.scenarioAns = [];renderPlay();}});}function showEnd(){$play.classList.remove('on');$end.classList.add('on');let msg;const pct = s.score / total;if (pct >= 0.9) msg = '你對四聖諦的核心已經有清晰的掌握，並能精準辨識八種苦的差異。可以開始把這套思考方式帶入每天的生活情境，從覺察「集」（盲點）開始練習。';else if (pct >= 0.7) msg = '基礎已經穩固。建議重玩答錯的關卡，特別留意「集」與「滅」的差別——看見內心的盲點，是四聖諦修學的關鍵轉折。';else if (pct >= 0.5) msg = '已經看見輪廓。佛法的「集」常是反直覺的（不是怪外境，而是看自己的執著），多走幾次這個流程會更清楚。建議搭配《學佛五講》p.16-23（三法印、四聖諦）與 p.32-36（人生觀、三苦）重讀。';else msg = '佛法的思路和日常邏輯很不一樣，第一次接觸有點繞是正常的。建議搭配音檔重聽，再玩一次，這次特別留意每一題的回饋說明。';$end.innerHTML = `

第五章 · 中道空觀（捨兩邊不執中間）
</div>
</div>
`;document.getElementById('bg-again').addEventListener('click', () => {s = { sIdx: 0, qIdx: 0, sel: null, sub: false, score: 0, scenarioAns: [] };$end.classList.remove('on');$play.classList.add('on');renderPlay();});}function advance(){if (s.sel === null) return;if (!s.sub) {s.sub = true;const qu = getQuestion();const opt = qu.options[s.sel];if (opt.correct) s.score++;const correctOpt = qu.options.find(o => o.correct);s.scenarioAns.push({ text: correctOpt.text, correct: opt.correct });renderPlay();} else {if (s.qIdx === 3) {renderSummary();} else {s.qIdx++;s.sel = null;s.sub = false;renderPlay();}}}document.getElementById('bg-go').addEventListener('click', () => {$welcome.classList.remove('on');$play.classList.add('on');renderPlay();});})();</script>
